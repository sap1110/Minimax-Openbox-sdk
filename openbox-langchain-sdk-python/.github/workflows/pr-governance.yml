name: PR Governance

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Validate PR governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming
        if: github.event_name == 'pull_request'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          pattern='^(feat|fix|hotfix|chore|docs|refactor|test|ci|build|release)\/[a-z0-9._-]+$'
          if [[ ! "${BRANCH_NAME}" =~ ${pattern} ]]; then
            echo "Invalid branch name: ${BRANCH_NAME}"
            echo "Expected pattern: <type>/<short-description>"
            exit 1
          fi

      - name: Validate PR title convention
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|chore|docs|refactor|test|build|ci|perf|revert)(\([a-z0-9._/-]+\))?!?: .+$'
          if [[ ! "${PR_TITLE}" =~ ${pattern} ]]; then
            echo "Invalid PR title: ${PR_TITLE}"
            echo "Use Conventional Commits, for example: feat(worker): add hook governance"
            exit 1
          fi

      - name: Validate commit messages when enabled
        if: github.event_name == 'pull_request' && vars.ENFORCE_COMMIT_CONVENTION == 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=1
          invalid=0
          while IFS= read -r subject; do
            if [[ -z "${subject}" ]]; then
              continue
            fi
            if [[ "${subject}" =~ ^Merge\  ]]; then
              continue
            fi
            if [[ ! "${subject}" =~ ^(feat|fix|chore|docs|refactor|test|build|ci|perf|revert)(\([a-z0-9._/-]+\))?!?:\ .+ ]]; then
              echo "Invalid commit subject: ${subject}"
              invalid=1
            fi
          done < <(git log --format=%s "origin/${BASE_REF}..HEAD")
          exit "${invalid}"

      - name: Validate sensitive path ownership policy
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        shell: bash
        run: |
          git fetch origin "${BASE_REF}" --depth=1
          mapfile -t changed_files < <(git diff --name-only "origin/${BASE_REF}...HEAD")

          needs_check=0
          for file in "${changed_files[@]}"; do
            case "${file}" in
              .github/workflows/*|.github/CODEOWNERS|SECURITY.md|.gitleaks.toml)
                needs_check=1
                ;;
            esac
          done

          if [ "${needs_check}" -eq 0 ]; then
            exit 0
          fi

          if [ ! -f .github/CODEOWNERS ]; then
            echo "::warning::.github/CODEOWNERS is not present; skipping sensitive path ownership enforcement."
            exit 0
          fi

          declare -A required_entries=(
            ["/.github/workflows/"]="workflow owners"
            ["/.github/CODEOWNERS"]="codeowners owners"
            ["/SECURITY.md"]="security owners"
            ["/.gitleaks.toml"]="secret scanning owners"
          )

          missing=()
          for pattern in "${!required_entries[@]}"; do
            if ! awk '!/^#/ && NF >= 2 {print $1}' .github/CODEOWNERS | grep -Fxq "${pattern}"; then
              missing+=("${required_entries[$pattern]} (${pattern})")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing CODEOWNERS coverage for:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "Sensitive file ownership policy is defined in CODEOWNERS."
