sonar.projectKey=openbox-langchain-sdk-python
sonar.projectName=openbox-langchain-sdk-python
sonar.sources=openbox_langchain
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.sourceEncoding=UTF-8

# Python configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Exclude local caches, build artifacts, and non-source project folders.
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/.venv/**,**/venv/**,**/env/**,**/.env/**,**/.pytest_cache/**,**/.mypy_cache/**,**/.ruff_cache/**,**/dist/**,**/build/**,**/*.egg-info/**,docs/**,examples/**
